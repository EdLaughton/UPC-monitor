services:
  upc-monitor:
    image: ${UPC_MONITOR_IMAGE:-ghcr.io/edlaughton/upc-monitor:latest}
    container_name: upc-monitor
    environment:
      POLL_CRON: "${POLL_CRON:-0 * * * *}"
      TIMEZONE: "${TIMEZONE:-Europe/London}"
      RUN_ON_START: "${RUN_ON_START:-true}"
      PORT: "8000"
      DATA_DIR: "/data"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      ALERTS_ENABLED: "${ALERTS_ENABLED:-false}"
      ALERTS_SYNC_AIRTABLE: "${ALERTS_SYNC_AIRTABLE:-false}"
      ALERTS_SCHEDULE_HOUR: "${ALERTS_SCHEDULE_HOUR:-10}"
      ALERTS_SCHEDULE_MINUTE: "${ALERTS_SCHEDULE_MINUTE:-5}"
      ALERTS_SINCE_DAYS: "${ALERTS_SINCE_DAYS:-7}"
      ALERTS_INCLUDE_LOW_CONFIDENCE: "${ALERTS_INCLUDE_LOW_CONFIDENCE:-false}"
      ALERTS_AIRTABLE_MAX_SYNC_RECORDS: "${ALERTS_AIRTABLE_MAX_SYNC_RECORDS:-100}"
      AIRTABLE_BASE_ID: "${AIRTABLE_BASE_ID:-appzaT3sgr7AfBKkn}"
    ports:
      - "${UPC_MONITOR_PORT:-8000}:8000"
    volumes:
      - /mnt/user/appdata/upc-monitor:/data
    restart: unless-stopped
